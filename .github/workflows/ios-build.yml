name: iOS Build

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'ios/**'
      - 'capacitor.config.ts'
      - 'package.json'
      - 'package-lock.json'

# Skeleton workflow — web build + cap sync on macOS.
# Full archive/sign/upload requires Apple credentials (see commented steps below).

jobs:
  build-web-and-sync:
    name: Build web assets & cap sync
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Production build needs VITE_* secrets — add repo secrets before enabling.
      # - name: Create .env.production
      #   run: |
      #     echo "VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}" >> .env.production
      #     echo "VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}" >> .env.production

      - name: Type-check
        run: npm run type-check

      - name: Build web bundle
        run: npm run build
        env:
          # Placeholder for CI — replace with secrets or skip build until configured.
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || 'placeholder-anon-key' }}

      - name: Sync Capacitor iOS project
        run: npx cap sync ios

      # Uncomment when Apple signing is configured in repo secrets:
      # - name: Install CocoaPods
      #   run: cd ios/App && pod install
      #
      # - name: Build iOS archive (requires signing)
      #   env:
      #     APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      #     APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
      #     APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      #     APPLE_PROVISIONING_PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}
      #   run: |
      #     xcodebuild -workspace ios/App/App.xcworkspace \
      #       -scheme App \
      #       -configuration Release \
      #       -destination 'generic/platform=iOS' \
      #       -archivePath build/Frovo.xcarchive \
      #       archive

      - name: Upload synced ios folder (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: ios-capacitor-sync
          path: ios/
          retention-days: 7
